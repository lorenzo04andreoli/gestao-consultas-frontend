<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <img src="/dentix-logo.svg" alt="Dentix" />
      <button class="menu-button" type="button" aria-label="Abrir menu">
        <i class="fa-solid fa-bars" aria-hidden="true"></i>
      </button>
    </div>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active">
        <i class="fa-regular fa-chart-bar" aria-hidden="true"></i>
        <span>Painel</span>
      </a>

      <details class="nav-group" data-menu-group="consultas">
        <summary>
          <i class="fa-regular fa-calendar" aria-hidden="true"></i>
          <span>Consultas</span>
          <i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i>
        </summary>

        <div class="nav-submenu">
          <a
            routerLink="/consultas"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="manterSubmenuAberto('consultas')"
          >
            Agenda
          </a>
          <a routerLink="/consultas/listar" routerLinkActive="active" (click)="manterSubmenuAberto('consultas')">
            Listar
          </a>
        </div>
      </details>

      <details class="nav-group" data-menu-group="pacientes">
        <summary>
          <i class="fa-regular fa-user" aria-hidden="true"></i>
          <span>Pacientes</span>
          <i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i>
        </summary>

        <div class="nav-submenu">
          <a routerLink="/pacientes/pesquisar" routerLinkActive="active" (click)="manterSubmenuAberto('pacientes')">
            Pesquisar
          </a>
          <a routerLink="/pacientes/listar" routerLinkActive="active" (click)="manterSubmenuAberto('pacientes')">
            Listar
          </a>
          <a routerLink="/pacientes/arquivados" routerLinkActive="active" (click)="manterSubmenuAberto('pacientes')">
            Arquivados
          </a>
        </div>
      </details>

      <details class="nav-group" data-menu-group="equipe">
        <summary>
          <i class="fa-regular fa-user" aria-hidden="true"></i>
          <span>Equipe</span>
          <i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i>
        </summary>

        <div class="nav-submenu">
          <a routerLink="/dentistas/pesquisar" routerLinkActive="active" (click)="manterSubmenuAberto('equipe')">
            Pesquisar
          </a>
          <a routerLink="/dentistas/listar" routerLinkActive="active" (click)="manterSubmenuAberto('equipe')">
            Listar
          </a>
          <a routerLink="/dentistas/arquivados" routerLinkActive="active" (click)="manterSubmenuAberto('equipe')">
            Arquivados
          </a>
        </div>
      </details>

      <details class="nav-group" data-menu-group="clinica">
        <summary>
          <i class="fa-regular fa-building" aria-hidden="true"></i>
          <span>Clínica</span>
          <i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i>
        </summary>

        <div class="nav-submenu">
          <a routerLink="/clinica/sobre" routerLinkActive="active" (click)="manterSubmenuAberto('clinica')">
            Sobre a clínica
          </a>
          <a routerLink="/clinica/especialidades" routerLinkActive="active" (click)="manterSubmenuAberto('clinica')">
            Especialidades
          </a>
        </div>
      </details>

      <a routerLink="/relatorios" routerLinkActive="active">
        <i class="fa-regular fa-file-lines" aria-hidden="true"></i>
        <span>Relatórios</span>
      </a>

      @if (authService.isAdmin()) {
        <details class="nav-group" data-menu-group="financeiro">
          <summary>
            <i class="fa-solid fa-dollar-sign" aria-hidden="true"></i>
            <span>Financeiro</span>
            <i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i>
          </summary>

          <div class="nav-submenu">
            <a
              routerLink="/financeiro"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="manterSubmenuAberto('financeiro')"
            >
              Lançamentos
            </a>
            <a
              routerLink="/financeiro/tabelas-preco"
              routerLinkActive="active"
              (click)="manterSubmenuAberto('financeiro')"
            >
              Tabela de preços
            </a>
          </div>
        </details>

        <a routerLink="/usuarios" routerLinkActive="active">
          <i class="fa-regular fa-address-card" aria-hidden="true"></i>
          <span>Usuários</span>
        </a>
      }
    </nav>

    <button type="button" class="logout-button" (click)="sair()">
      <i class="fa-solid fa-arrow-right-from-bracket" aria-hidden="true"></i>
      <span>Sair</span>
    </button>
  </aside>

  <main class="content">
    <router-outlet />
  </main>

  <app-confirmation-dialog />
</div>
