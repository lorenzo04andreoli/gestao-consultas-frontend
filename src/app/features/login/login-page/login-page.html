<main class="login-page">
  <section class="login-panel" aria-label="Acesso ao sistema">
    <div class="brand">
      <img src="/dentix-logo.svg" alt="Dentix" />
    </div>

    <header class="login-header">
      <h1>Login</h1>
      <p>Entre com suas credenciais para acessar sua conta.</p>
    </header>

    <form (ngSubmit)="entrar()">
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrapper">
          <i class="fa-regular fa-envelope field-icon" aria-hidden="true"></i>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            [(ngModel)]="email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock field-icon" aria-hidden="true"></i>
          <input
            id="senha"
            [type]="mostrarSenha ? 'text' : 'password'"
            name="senha"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            [(ngModel)]="senha"
            required
          />
          <button
            class="toggle-password"
            type="button"
            [attr.aria-label]="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'"
            (click)="alternarVisibilidadeSenha()"
          >
            <i
              class="fa-regular"
              [class.fa-eye]="!mostrarSenha"
              [class.fa-eye-slash]="mostrarSenha"
              aria-hidden="true"
            ></i>
          </button>
        </div>
      </div>

      @if (erro) {
        <p class="erro">{{ erro }}</p>
      }

      <button class="submit-button" type="submit" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </section>
</main>
