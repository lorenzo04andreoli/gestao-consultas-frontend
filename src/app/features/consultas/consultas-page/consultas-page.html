<section class="page">
  <header class="page-header">
    <div>
      <h1>Consultas</h1>
      <p>Acompanhe agendamentos, cancelamentos e finalizacoes.</p>
    </div>

    <button type="button" class="primary-button" (click)="abrirModalCadastro()">
      Agendar consulta
    </button>
  </header>

  @if (erro()) {
    <p class="alert error">{{ erro() }}</p>
  }

  @if (sucesso()) {
    <p class="alert success">{{ sucesso() }}</p>
  }

  <section class="schedule-card">
    <header class="schedule-toolbar">
      <div class="dentist-filter">
        <label>Profissional</label>
        <select name="dentistaFiltroId" [(ngModel)]="dentistaFiltroId" (ngModelChange)="aoAlterarFiltroDentista()">
          <option [ngValue]="null">Todos os dentistas</option>
          @for (dentista of dentistas(); track dentista.id) {
            <option [ngValue]="dentista.id">{{ dentista.nome }}</option>
          }
        </select>
      </div>
    </header>

    <div class="calendar-shell">
      <full-calendar
        #calendar
        [options]="calendarOptions"
        [events]="calendarEvents"
        [deepChangeDetection]="true"
      ></full-calendar>
    </div>
  </section>

  @if (modalCadastroAberto()) {
    <app-consulta-form-modal
      [form]="consultaForm"
      [modo]="modoModal"
      [confirmandoReagendamento]="confirmandoReagendamento"
      [podeExibirAcoes]="podeExibirAcoesModal()"
      [pacientes]="pacientes()"
      [dentistas]="dentistas()"
      [especialidades]="especialidadesDoDentistaSelecionado()"
      (fechar)="fecharModalCadastro()"
      (salvar)="salvar()"
      (dentistaAlterado)="aoSelecionarDentista()"
      (finalizar)="finalizarConsultaSelecionada()"
      (cancelarConsulta)="cancelarConsultaSelecionada()"
    />
  }

  @if (modalCancelamentoAberto()) {
    <app-consulta-cancelamento-modal
      [resumo]="resumoConsultaCancelamento()"
      (fechar)="fecharModalCancelamento()"
      (confirmar)="cancelarConsulta($event)"
    />
  }
</section>
